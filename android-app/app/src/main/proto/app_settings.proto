syntax = "proto3";

option java_package = "com.makia.jtchart.persistence.settings.proto";
option java_multiple_files = true;
option java_outer_classname = "AppSettingsSchema";

message AppSettingsProto {
  uint32 schema_version = 1;
  repeated string symbols = 2;
  string current_symbol = 3;
  string source = 4;
  string interval = 5;
  uint32 limit = 6;
  uint32 mom_start = 7;
  uint32 mom_end = 8;
  uint32 z_length = 9;
  double extreme_threshold = 10;
  uint32 smooth_length = 11;
  uint32 bear_wma_length = 12;
  uint32 auto_refresh_seconds = 13;
  optional bool signal_notifications_enabled = 14;
}
